<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StarPOS ERP</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><div class="logo">★</div><div><h1>StarPOS</h1><span>ERP Yönetim Sistemi</span></div></div>
    <nav id="menu"></nav>
    <div class="side-footer">StarPOS ERP v1.0<br><small>POS • Stok • Cari • Depo</small></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div><button id="collapseBtn" class="iconbtn">☰</button><span id="pageTitle">Dashboard</span></div>
      <div class="global-search"><span>🔎</span><input id="globalSearch" placeholder="Ürün, barkod, cari veya işlem ara..." /></div>
      <div class="userbox"><span>Yönetici</span><b>HY</b></div>
    </header>

    <section id="dashboard" class="page active"></section>
    <section id="pos" class="page"></section>
    <section id="products" class="page"></section>
    <section id="stock" class="page"></section>
    <section id="barcode" class="page"></section>
    <section id="current" class="page"></section>
    <section id="purchase" class="page"></section>
    <section id="suppliers" class="page"></section>
    <section id="warehouse" class="page"></section>
    <section id="cash" class="page"></section>
    <section id="staff" class="page"></section>
    <section id="reports" class="page"></section>
    <section id="settings" class="page"></section>
  </main>

  <div id="modal" class="modal hidden"><div class="modal-card"><button class="close" onclick="closeModal()">×</button><div id="modalBody"></div></div></div>
  <script src="app.js"></script>
</body>
</html>
